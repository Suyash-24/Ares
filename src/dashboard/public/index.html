<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ares | Celestial Command Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030303;
            /* Optional noise overlay for premium feel */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        }
        .font-headline {
            font-family: 'Plus Jakarta Sans', 'Space Grotesk', sans-serif;
            letter-spacing: -0.04em; /* Tighter tracking for modern aesthetic */
        }
        .font-label {
            font-family: 'Space Grotesk', sans-serif;
        }
        /* Cosmic scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
        
        /* Premium Glass Systems */
        .glass-premium {
            background: linear-gradient(145deg, rgba(20,20,20,0.6) 0%, rgba(10,10,10,0.8) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .glass-premium:hover {
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(132, 85, 239, 0.1);
        }
        .glass-panel {
            backdrop-filter: blur(24px);
            background: rgba(15, 15, 15, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .glass-pill {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Ambient Glow Blurs (Noctaly/Bleed style) */
        .ambient-blur-primary {
            background: radial-gradient(circle at center, rgba(132, 85, 239, 0.15) 0%, transparent 60%);
            filter: blur(60px);
        }
        .ambient-blur-secondary {
            background: radial-gradient(circle at center, rgba(75, 215, 246, 0.12) 0%, transparent 60%);
            filter: blur(60px);
        }

        /* Button Glows */
        .btn-glow {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.3);
        }

        /* Text Gradients */
        .text-gradient-premium {
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-primary {
            background: linear-gradient(135deg, #d0bcff 0%, #8455ef 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Animations */
        @keyframes float-slow {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(132, 85, 239, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(132, 85, 239, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(132, 85, 239, 0); }
        }
        .animate-float-slow { animation: float-slow 8s ease-in-out infinite; }
        .animate-pulse-ring { animation: pulse-ring 3s infinite; }
        
        /* Grid background pattern */
        .bg-grid-pattern {
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
        }
    </style>
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#d0bcff", "primary-dim": "#8455ef", "primary-container": "#7f65c1",
              "secondary": "#4bd7f6", "secondary-dim": "#40ceed", "secondary-container": "#00b5d3",
              "background": "#030303", "on-background": "#ffffff",
              "surface": "#0a0a0a", "surface-bright": "#141414",
              "surface-variant": "#1c1c1c", "on-surface": "#ffffff", "on-surface-variant": "#a1a1aa",
              "border-dim": "rgba(255,255,255,0.05)", "border-light": "rgba(255,255,255,0.1)"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans", "Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Space Grotesk", "sans-serif"]
            },
            animation: {
                "spin-slow": "spin 8s linear infinite",
            }
          }
        }
      }
    </script>
</head>
<body class="bg-background text-on-background selection:bg-primary/30 selection:text-white min-h-screen overflow-x-hidden antialiased">
    <div id="page-loading" class="fixed inset-0 bg-background/80 backdrop-blur-sm z-[100] hidden items-center justify-center">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
            <span class="text-xs text-on-surface-variant font-label tracking-widest uppercase">Loading</span>
        </div>
    </div>
    <div id="page-content" class="min-h-screen w-full relative"></div>

    <script src="/js/api.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/pages/landing.js"></script>
    <script src="/js/pages/docs.js"></script>
    <script src="/js/pages/guilds.js"></script>
    <script src="/js/pages/overview.js"></script>
    <script src="/js/pages/config.js"></script>
    <script src="/js/pages/moderation.js"></script>
    <script src="/js/pages/music.js"></script>
    <script src="/js/pages/stats.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
