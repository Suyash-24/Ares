<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ares | Celestial Command Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
        }
        .font-headline {
            font-family: 'Inter', 'Geist', sans-serif;
            letter-spacing: -0.05em; /* Tighter tracking for modern aesthetic */
        }
        .font-label {
            font-family: 'Space Grotesk', sans-serif;
        }
        /* Cosmic scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
        
        /* Exact Glass Panels (Bleed/Noctaly Style) */
        .glass-exact {
            background-color: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem; /* rounded-3xl */
            transition: all 0.2s ease-in-out;
        }
        .glass-exact:hover {
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        /* Floating Nav */
        .glass-nav {
            background-color: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px; /* rounded-full */
        }

        /* Abstract Glow Blurs (Noctaly/Bleed style) */
        .glow-orb-primary {
            background: radial-gradient(circle at center, rgba(37, 99, 235, 0.25) 0%, transparent 60%);
            filter: blur(120px);
        }
        .glow-orb-secondary {
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.25) 0%, transparent 60%);
            filter: blur(120px);
        }

        /* Button exact */
        .btn-primary-exact {
            background-color: #ffffff;
            color: #000000;
            border-radius: 9999px; /* rounded-full */
            font-weight: 700;
            transition: all 0.2s ease;
        }
        .btn-primary-exact:hover {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .btn-secondary-exact {
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px; /* rounded-full */
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-secondary-exact:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }

        /* Equalizer animations for Audio card */
        @keyframes eq1 { from { height: 20%; } to { height: 60%; } }
        @keyframes eq2 { from { height: 40%; } to { height: 80%; } }
        @keyframes eq3 { from { height: 50%; } to { height: 95%; } }
        @keyframes eq4 { from { height: 70%; } to { height: 100%; } }
        @keyframes eq5 { from { height: 30%; } to { height: 70%; } }

        /* Text Gradients */
        .text-gradient-premium {
            background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#3b82f6", "primary-dim": "#2563eb",
              "secondary": "#8b5cf6", "secondary-dim": "#7c3aed",
              "background": "#000000", "on-background": "#ffffff",
              "surface": "#050505", "surface-bright": "#0a0a0a",
              "surface-variant": "#121212", "on-surface": "#ffffff", "on-surface-variant": "#a1a1aa",
              "border-dim": "rgba(255,255,255,0.05)", "border-light": "rgba(255,255,255,0.1)"
            },
            fontFamily: {
              "headline": ["Inter", "Geist", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Space Grotesk", "sans-serif"]
            }
          }
        }
      }
    </script>
</head>
<body class="bg-background text-on-background selection:bg-primary/30 selection:text-white min-h-screen overflow-x-hidden antialiased">
    <div id="page-loading" class="fixed inset-0 bg-background/80 backdrop-blur-sm z-[100] hidden items-center justify-center">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
            <span class="text-xs text-on-surface-variant font-label tracking-widest uppercase">Loading</span>
        </div>
    </div>
    <div id="page-content" class="min-h-screen w-full relative"></div>

    <script src="/js/api.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/pages/landing.js"></script>
    <script src="/js/pages/docs.js"></script>
    <script src="/js/pages/guilds.js"></script>
    <script src="/js/pages/overview.js"></script>
    <script src="/js/pages/config.js"></script>
    <script src="/js/pages/moderation.js"></script>
    <script src="/js/pages/music.js"></script>
    <script src="/js/pages/stats.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
